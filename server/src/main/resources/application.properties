spring.application.name=server

# MongoDB (Already partially correct)
spring.mongodb.uri=mongodb+srv://${MONGO_USER}:${MONGO_PASSWORD}@cluster0.flyswrv.mongodb.net/smart_campus_db?retryWrites=true&w=majority


# --- Microsoft / Azure AD OAuth2 Config ---
spring.security.oauth2.client.registration.microsoft.client-id=${AZURE_CLIENT_ID}
spring.security.oauth2.client.registration.microsoft.client-secret=${AZURE_CLIENT_SECRET}
spring.security.oauth2.client.registration.microsoft.scope=openid,profile,email
spring.security.oauth2.client.registration.microsoft.client-name=Microsoft
spring.security.oauth2.client.registration.microsoft.provider=microsoft
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.microsoft.redirect-uri={baseUrl}/login/oauth2/code/microsoft

# Microsoft Provider Details
spring.security.oauth2.client.provider.microsoft.issuer-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/v2.0
spring.security.oauth2.client.provider.microsoft.authorization-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/authorize?prompt=select_account
spring.security.oauth2.client.provider.microsoft.token-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token
spring.security.oauth2.client.provider.microsoft.jwk-set-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/discovery/v2.0/keys
spring.security.oauth2.client.provider.microsoft.user-name-attribute=name

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USER:smartcampus.group17@gmail.com}
spring.mail.password=${GMAIL_APP_PASSWORD:fallback_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.org.springframework.security=DEBUG
ai.microservice.url=http://localhost:8000/api/chat
ai.microservice.token=${UNIBOOKING_AI_TOKEN}

spring.thymeleaf.cache=false
app.frontend.url=${FRONTEND_URL:http://localhost:5173}